<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL | NEUROSTACK</title>
    <style>
        :root { --main: #ff4444; --bg: #0a0a0a; --card: #151515; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; }
        
        nav { padding: 20px 5%; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; color: var(--main); letter-spacing: 2px; text-decoration: none; }

        main { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input, select { flex: 1; padding: 15px; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 1rem; }
        .btn-primary { padding: 0 30px; background: var(--main); border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; }

        .admin-card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 30px; display: none; }
        .section-title { color: var(--main); font-size: 0.8rem; font-weight: bold; margin: 25px 0 10px; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: #333; }

        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .info-item { background: #1a1a1a; padding: 15px; border-radius: 8px; }
        .label { font-size: 0.75rem; color: #777; margin-bottom: 5px; }
        .value { font-weight: bold; font-size: 1.1rem; }

        .content-box { background: #000; padding: 20px; border-radius: 8px; line-height: 1.6; white-space: pre-wrap; color: #ccc; border: 1px solid #222; }
        
        .control-group { margin-top: 40px; padding-top: 30px; border-top: 1px solid #333; }
        .status-selects { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn-save { width: 100%; padding: 20px; background: var(--main); border: none; color: #fff; font-weight: 900; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #ff2222; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 68, 68, 0.3); }
    </style>
</head>
<body>

<nav><a href="#" class="logo">NEUROSTACK ADMIN</a></nav>

<main>
    <div class="search-box">
        <input type="text" id="targetId" placeholder="조회할 학번 입력">
        <button class="btn-primary" onclick="loadData()">조회</button>
    </div>

    <div id="adminCard" class="admin-card">
        <div class="grid-info">
            <div class="info-item"><div class="label">이름</div><div class="value" id="resName">-</div></div>
            <div class="info-item"><div class="label">연락처</div><div class="value" id="resPhone">-</div></div>
            <div class="info-item"><div class="label">제출 시간</div><div class="value" id="resTime">-</div></div>
            <div class="info-item"><div class="label">학번</div><div class="value" id="resId">-</div></div>
        </div>

        <div class="section-title">1. 게임 개발 경험(또는 경험 언어)</div>
        <div class="content-box" id="resGameExp"></div>

        <div class="section-title">2. 자기소개</div>
        <div class="content-box" id="resIntro"></div>

        <div class="section-title">3. 보유 자격증</div>
        <div class="content-box" id="resLicense"></div>

        <div class="section-title">4. 가입 사유</div>
        <div class="content-box" id="resReason"></div>

        <div class="section-title">5. 하고 싶은 활동</div>
        <div class="content-box" id="resWish"></div>

        <div class="section-title">6. AI 활용 계획</div>
        <div class="content-box" id="resAi"></div>

        <div class="control-group">
            <div class="status-selects">
                <div>
                    <div class="label">면접 단계</div>
                    <select id="selInterview">
                        <option value="서류 검토 중">서류 검토 중</option>
                        <option value="대상자 (일정 안내 완료)">면접 대상자</option>
                        <option value="면접 완료">면접 완료</option>
                        <option value="해당 없음">해당 없음</option>
                    </select>
                </div>
                <div>
                    <div class="label">최종 상태</div>
                    <select id="selStatus">
                        <option value="심사 중">심사 중</option>
                        <option value="최종 합격">최종 합격</option>
                        <option value="불합격">불합격</option>
                        <option value="지원 취소">지원 취소</option>
                    </select>
                </div>
            </div>
            <button class="btn-save" onclick="updateData()">시트 데이터 업데이트</button>
        </div>
    </div>
</main>

<script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbyIKxy2MrBCEbREoMDiIeFllN4V-mri4ZXa8v2eazv2ySqgj2e1ME2FPxo0XjtFI9au9Q/exec';

    async function loadData() {
        const id = document.getElementById('targetId').value;
        if(!id) return alert("학번을 입력하세요.");
        
        const card = document.getElementById('adminCard');
        try {
            const res = await fetch(`${APP_URL}?action=check&id=${id}`).then(r => r.json());
            if(res.found) {
                card.style.display = 'block';
                document.getElementById('resName').innerText = res.name;
                document.getElementById('resPhone').innerText = res.phone;
                document.getElementById('resTime').innerText = res.time;
                document.getElementById('resId').innerText = res.studentId;
                
                // 모든 서술형 필드 주입
                document.getElementById('resGameExp').innerText = res.gameExp || '없음';
                document.getElementById('resIntro').innerText = res.intro || '없음';
                document.getElementById('resLicense').innerText = res.license || '없음';
                document.getElementById('resReason').innerText = res.reason || '없음';
                document.getElementById('resWish').innerText = res.wishList || '없음';
                document.getElementById('resAi').innerText = res.aiPlan || '없음';
                
                // 셀렉트 박스 동기화
                document.getElementById('selInterview').value = res.interview;
                document.getElementById('selStatus').value = res.status;
            } else {
                alert("해당 학번의 지원서를 찾을 수 없습니다.");
                card.style.display = 'none';
            }
        } catch(e) { alert("연결 실패"); }
    }

    async function updateData() {
        const id = document.getElementById('targetId').value;
        const interview = document.getElementById('selInterview').value;
        const status = document.getElementById('selStatus').value;
        
        if(!confirm("수정 사항을 구글 시트에 반영하시겠습니까?")) return;

        try {
            const res = await fetch(APP_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'adminUpdate',
                    studentId: id,
                    interview: interview,
                    status: status
                })
            }).then(r => r.text());

            if(res === "UPDATE_OK") alert("성공적으로 업데이트되었습니다.");
            else alert("오류 발생: " + res);
        } catch(e) { alert("서버 통신 오류"); }
    }
</script>
</body>
</html>
