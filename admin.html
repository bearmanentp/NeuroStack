<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | NEUROSTACK</title>
    <style>
        :root { --o: #FF8C00; --dark: #0a0a0a; --admin: #ff0000; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark); color: #fff; 
            font-family: 'Pretendard', sans-serif; overflow-x: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        nav { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; position: fixed; width: 100%; 
            box-sizing: border-box; z-index: 100; top: 0; 
        }
        .logo { font: 900 1.5rem sans-serif; color: var(--admin); text-decoration: none; letter-spacing: 3px; }
        
        section { 
            position: relative; z-index: 10; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
            padding: 100px 20px; pointer-events: none;
        }

        .card { 
            pointer-events: auto;
            background: rgba(10, 0, 0, 0.95);
            border: 1px solid var(--admin);
            padding: 40px; border-radius: 20px;
            width: 100%; max-width: 550px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
            text-align: center;
        }

        h2 { color: var(--admin); margin: 0 0 20px 0; letter-spacing: 2px; }
        label { display: block; font-size: 0.75rem; color: var(--admin); opacity: 0.8; margin-bottom: 5px; text-align: left; font-weight: bold; }

        /* 정보 그리드 */
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px; border-radius: 12px; margin-bottom: 20px;
            border: 1px solid #222;
        }
        .info-item { text-align: left; }
        .info-label { font-size: 0.7rem; opacity: 0.5; margin-bottom: 3px; }
        .info-val { font-size: 1rem; font-weight: 700; color: #eee; }

        /* 서술형 박스 */
        .motive-box {
            text-align: left; padding: 15px; background: rgba(0,0,0,0.3);
            border-radius: 8px; border: 1px solid #333;
            font-size: 0.85rem; line-height: 1.6; margin-bottom: 20px;
            white-space: pre-wrap; max-height: 200px; overflow-y: auto;
            color: #ccc;
        }

        input, select {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444; color: #fff; border-radius: 8px;
            box-sizing: border-box; font-size: 1rem;
        }
        input:focus, select:focus { border-color: var(--admin); outline: none; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-fetch { 
            flex: 1; padding: 12px; background: transparent; 
            border: 1px solid #fff; color: #fff; cursor: pointer; 
            border-radius: 8px; font-weight: bold; transition: 0.3s;
        }
        .btn-fetch:hover { background: #fff; color: #000; }

        .btn-update {
            width: 100%; padding: 18px; background: var(--admin);
            border: none; color: #fff; font-weight: 900; cursor: pointer;
            border-radius: 8px; transition: 0.3s; font-size: 1rem;
        }
        .btn-update:hover { background: #b30000; box-shadow: 0 0 20px var(--admin); }

        #edit-area { border-top: 2px solid #333; padding-top: 25px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 스크롤바 커스텀 */
        .motive-box::-webkit-scrollbar { width: 5px; }
        .motive-box::-webkit-scrollbar-thumb { background: var(--admin); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <nav><a href="index.html" class="logo">NEUROSTACK ADMIN</a></nav>

    <section>
        <div class="card">
            <h2>DATABASE CONTROL</h2>
            
            <label style="color:#aaa;">Target Student ID (학번)</label>
            <div class="btn-group">
                <input type="text" id="tId" placeholder="예: 20401" style="margin:0;">
                <button class="btn-fetch" onclick="fetchCurrentStatus()">데이터 로드</button>
            </div>

            <div id="edit-area" style="display: none;">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">이름</div>
                        <div class="info-val" id="dispName">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">연락처</div>
                        <div class="info-val" id="dispPhone">-</div>
                    </div>
                </div>

                <label>지원 상세 내용 (자기소개/경험/계획)</label>
                <div class="motive-box" id="dispMotive">데이터를 불러오는 중입니다...</div>
                
                <hr style="border:0; border-top:1px solid #333; margin:25px 0;">

                <label>면접 상태 설정 (K열)</label>
                <select id="sInterview">
                    <option value="서류 검토 중">서류 검토 중</option>
                    <option value="대상자 (일정 안내 완료)">면접 대상자</option>
                    <option value="면접 완료">면접 완료</option>
                    <option value="해당 없음">해당 없음</option>
                    <option value="취소됨">취소됨</option>
                </select>

                <label>최종 합격 여부 (L열)</label>
                <select id="sFinal">
                    <option value="심사 중">심사 중</option>
                    <option value="최종 합격">최종 합격 (PASS)</option>
                    <option value="불합격">불합격 (FAIL)</option>
                    <option value="지원 취소">지원 취소</option>
                </select>

                <button class="btn-update" onclick="updateStatus()">시트 데이터 동기화</button>
            </div>
        </div>
    </section>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Three.js 배경 (붉은 관리자 테마)
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 12;

        const count = 150;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        for(let i=0; i<count*3; i++) positions[i] = (Math.random() - 0.5) * 20;
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0xff0000, size: 0.12, transparent: true, opacity: 0.5 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);

        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.001;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.001;
        });

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.001;
            points.rotation.x += (mouseY - points.rotation.x) * 0.05;
            points.rotation.y += (mouseX - points.rotation.y) * 0.05;
            renderer.render(scene, camera);
        }
        animate();

        // 2. 관리자 기능 로직
        // 배포된 구글 앱스 스크립트 URL을 입력하세요.
        const URL = 'https://script.google.com/macros/s/AKfycbzIynSo0BYdNd0-WfNGyhOitZ7cVwPEBQoCC3su7EnIjAbJUbpDRHXRsCcdGl66XMLdZA/exec';

        window.fetchCurrentStatus = async () => {
            const id = document.getElementById('tId').value;
            if(!id) return alert("학번을 입력하세요.");
            
            try {
                const res = await fetch(`${URL}?action=check&id=${id}`).then(r => r.json());
                
                if(res.found) {
                    document.getElementById('edit-area').style.display = 'block';
                    
                    // 상세 정보 출력 (이름, 전화번호, 통합 서술형 내용)
                    document.getElementById('dispName').innerText = res.name || '정보 없음';
                    document.getElementById('dispPhone').innerText = res.phone || '정보 없음';
                    document.getElementById('dispMotive').innerText = res.motive || '작성된 내용이 없습니다.';
                    
                    // 상태 값 설정 (기존 데이터와 드롭다운 동기화)
                    document.getElementById('sInterview').value = res.interview;
                    document.getElementById('sFinal').value = res.status;
                } else {
                    alert("해당 학생을 찾을 수 없습니다.");
                    document.getElementById('edit-area').style.display = 'none';
                }
            } catch(e) {
                alert("서버 통신 실패! GAS 배포 URL과 권한을 확인하세요.");
            }
        };

        window.updateStatus = async () => {
            const id = document.getElementById('tId').value;
            const interview = document.getElementById('sInterview').value;
            const status = document.getElementById('sFinal').value;
            
            if(!confirm("해당 학생의 시트 데이터를 수정하시겠습니까?")) return;

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'adminUpdate', // 백엔드 doPost 분기용
                        studentId: id,
                        interview: interview,
                        status: status
                    })
                }).then(r => r.text());

                if(response === "UPDATE_OK") {
                    alert("동기화 성공! 구글 시트가 업데이트되었습니다.");
                } else {
                    alert("업데이트 실패: " + response);
                }
            } catch(e) {
                alert("네트워크 오류가 발생했습니다.");
            }
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
