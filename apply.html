<div class="card">
    <h2 style="color: var(--o); margin-bottom: 20px;">NEUROSTACK APPLICATION</h2>
    <form id="applyForm">
        <input type="text" name="studentId" placeholder="학번" required>
        <input type="text" name="name" placeholder="이름" required>
        <input type="tel" name="phone" placeholder="전화번호" required>
        
        <label>게임 개발 경험</label>
        <textarea name="gameExp" placeholder="유니티, 언리얼 등 사용 경험이 있다면 적어주세요."></textarea>
        
        <label>자기소개</label>
        <textarea name="intro" required></textarea>
        
        <label>자격증</label>
        <input type="text" name="license" placeholder="보유 자격증 (없으면 없음)">
        
        <label>가입 사유</label>
        <textarea name="reason" required></textarea>
        
        <label>동아리에서 하고 싶은 것</label>
        <textarea name="wishList" required></textarea>
        
        <label>AI 활용 계획</label>
        <textarea name="aiPlan" required></textarea>

        <button type="submit">SUBMIT APPLICATION</button>
    </form>
</div>
