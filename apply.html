<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APPLY | NEUROSTACK</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <nav>
        <a href="index.html" class="logo">NEUROSTACK</a>
        <div class="nav-links">
            <a href="apply.html">SUPPORT</a>
            <a href="check.html">STATUS</a>
        </div>
    </nav>

    <section>
        <div class="card">
            <h2 style="color: var(--o); margin-bottom: 25px;">APPLICATION</h2>
            <form id="applyForm">
                <input type="text" name="studentId" placeholder="학번 (예: 20261234)" required>
                <input type="text" name="name" placeholder="이름" required>
                <input type="tel" name="phone" placeholder="전화번호 (010-0000-0000)" required>
                
                <label>게임 개발 경험</label>
                <textarea name="gameExp" placeholder="유니티, 언리얼, C# 등 사용 경험이 있다면 적어주세요."></textarea>
                
                <label>자기소개</label>
                <textarea name="intro" placeholder="본인을 한 줄로 표현하거나 자유롭게 소개해 주세요." required></textarea>
                
                <label>자격증</label>
                <input type="text" name="license" placeholder="보유 자격증 (없으면 '없음' 입력)">
                
                <label>가입 사유</label>
                <textarea name="reason" placeholder="뉴로스택을 선택한 이유" required></textarea>
                
                <label>동아리에서 하고 싶은 것</label>
                <textarea name="wishList" placeholder="동아리에 들어와서 만들고 싶은 게임이나 활동" required></textarea>
                
                <label>AI 활용 계획</label>
                <textarea name="aiPlan" placeholder="AI 도구를 어떻게 활용하여 개발할 예정인가요?" required></textarea>

                <div style="margin-top: 20px;">
                    <button type="submit">SUBMIT APPLICATION</button>
                </div>
            </form>
        </div>
    </section>

    <script type="module" src="script.js"></script>
</body>
</html>
