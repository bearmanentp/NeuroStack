<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NEUROSTACK | Check</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><a href="index.html" class="logo">NEUROSTACK</a></nav>
    <canvas id="bg-canvas"></canvas>

    <section>
        <div class="card" style="text-align: center;">
            <h2 style="margin-bottom: 30px;">STATUS CHECK</h2>
            <input type="text" id="cId" placeholder="학번">

            <div id="statusRes" style="margin-top: 30px; display: none; padding: 20px; border: 1px dashed var(--orange);"></div>
        </div>
    </section>
    <script type="module" src="script.js"></script>
</body>
</html>
