<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STATUS | NEUROSTACK</title>
    <style>
        :root { --o: #FF8C00; --dark: #0a0a0a; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark); color: #fff; 
            font-family: 'Pretendard', sans-serif; overflow-x: hidden;
        }

        /* 배경 캔버스 */
        #bg-canvas { 
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; z-index: 1; 
        }

        /* 네비게이션 */
        nav { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; position: fixed; width: 100%; 
            box-sizing: border-box; z-index: 100; top: 0; 
        }
        .logo { font: 900 1.5rem sans-serif; color: var(--o); text-decoration: none; letter-spacing: 3px; }
        .nav-links a { color: #fff; text-decoration: none; margin-left: 20px; font-weight: 700; font-size: 0.9rem; }

        /* 콘텐츠 섹션 */
        section { 
            position: relative; z-index: 10; 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            padding: 0 20px; pointer-events: none;
        }

        /* 조회 카드 디자인 */
        .card { 
            pointer-events: auto;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid var(--o);
            padding: 40px; border-radius: 20px;
            width: 100%; max-width: 400px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { color: var(--o); margin: 0 0 10px 0; font-size: 1.8rem; }
        .desc { opacity: 0.7; font-size: 0.9rem; margin-bottom: 30px; }

        /* 입력창 및 버튼 */
        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333; color: #fff; border-radius: 8px;
            box-sizing: border-box; font-size: 1rem; text-align: center;
        }
        input:focus { border-color: var(--o); outline: none; }

        .btn {
            width: 100%; padding: 15px;
            background: transparent; border: 2px solid var(--o);
            color: var(--o); font-weight: 900; cursor: pointer;
            transition: 0.3s; letter-spacing: 1px;
        }
        .btn:hover { background: var(--o); color: #000; box-shadow: 0 0 20px var(--o); }

        /* 결과창 내부 스타일 */
        #statusRes { margin-top: 25px; text-align: left; border-top: 1px solid #333; padding-top: 20px; }
        .res-box { animation: fadeIn 0.5s ease; }
        .res-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem; }
        .label { opacity: 0.6; }
        .val { color: var(--o); font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav>
        <a href="index.html" class="logo">NEUROSTACK</a>
        <div class="nav-links">
            <a href="apply.html">SUPPORT</a>
            <a href="check.html">STATUS</a>
        </div>
    </nav>

    <section>
        <div class="card">
            <h2>STATUS CHECK</h2>
            <p class="desc">학번을 입력하여 결과를 확인하세요.</p>
            
            <input type="text" id="cId" placeholder="학번 입력 (ex. 20401)">
            <button class="btn" onclick="checkStatus()">CHECK DETAILS</button>

            <div id="statusRes" style="display:none;"></div>
        </div>
    </section>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. 배경 애니메이션 (메인과 동일)
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        camera.position.z = 12;

        const count = 150;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        for(let i=0; i<count*3; i++) positions[i] = (Math.random() - 0.5) * 20;
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0xFF8C00, size: 0.1, transparent: true, opacity: 0.6 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);

        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.001;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.001;
        });

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.002;
            points.rotation.x += (mouseY - points.rotation.x) * 0.05;
            points.rotation.y += (mouseX - points.rotation.y) * 0.05;
            renderer.render(scene, camera);
        }
        animate();

        // 2. 조회 기능
        const URL = 'https://script.google.com/macros/s/AKfycbxxCwKOjSfmLEQjxdC9wRHpLF_QcAQOEpAeOvCT1aDos8-Ma8-91VdK97MOypdtNuOwdg/exec';

        window.checkStatus = async () => {
            const id = document.getElementById('cId').value;
            if(!id) return alert("학번을 입력해주세요.");
            const resDiv = document.getElementById('statusRes');
            resDiv.style.display = 'block';
            resDiv.innerHTML = "조회 중...";

            try {
                const res = await fetch(`${URL}?action=check&id=${id}`).then(r => r.json());
                if(res.found) {
                    resDiv.innerHTML = `
                        <div class="res-box">
                            <div class="res-line"><span class="label">이름</span><span class="val">${res.name}</span></div>
                            <div class="res-line"><span class="label">상태</span><span class="val">${res.status}</span></div>
                            <div class="res-line"><span class="label">면접일</span><span class="val">3월 9일</span></div>
                            <div class="res-line"><span class="label">장소</span><span class="val">1층 AI융합실</span></div>
                        </div>`;
                } else {
                    resDiv.innerHTML = "정보를 찾을 수 없습니다.";
                }
            } catch(e) {
                resDiv.innerHTML = "에러가 발생했습니다.";
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
