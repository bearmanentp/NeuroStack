<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NEUROSTACK | Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">NEUROSTACK</a>
        <div class="nav-links">
            <a href="apply.html">SUPPORT</a>
            <a href="check.html">STATUS</a>
        </div>
    </nav>
    <canvas id="bg-canvas"></canvas>

    <section>
        <h1 style="font-size: 8vw; color: var(--orange); margin:0;">NEUROSTACK</h1>
        <p style="letter-spacing: 10px; opacity:0.7;">ENGINEERING THE FUTURE</p>
        <div style="margin-top: 50px;">
            <a href="apply.html" class="btn-legend">GET STARTED</a>
        </div>
    </section>

    <section id="image-section">
        <div id="a2-poster" style="width: auto; height: 80vh; aspect-ratio: 1/1.414; border: 2px solid var(--orange); opacity: 0; transform: translateY(50px);">
            <img src="poster.jpg" alt="A2 Poster" style="width:100%; height:100%; object-fit:cover;">
        </div>
    </section>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module" src="script.js"></script>
    <script>
        window.addEventListener('load', () => {
            gsap.registerPlugin(ScrollTrigger);
            gsap.to("#a2-poster", {
                scrollTrigger: { trigger: "#image-section", start: "top 70%" },
                opacity: 1, y: 0, duration: 1.5
            });
        });
    </script>
</body>
</html>
