<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROSTACK | FUTURE ENGINEERING</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <nav>
        <a href="index.html" class="logo">NEUROSTACK</a>
        <div class="nav-links">
            <a href="apply.html">SUPPORT</a>
            <a href="check.html">STATUS</a>
        </div>
    </nav>

    <section>
        <h1 style="font-size: clamp(3rem, 10vw, 8rem); margin: 0; color: var(--o); font-weight: 900; text-shadow: 0 0 20px rgba(255,140,0,0.3);">NEUROSTACK</h1>
        <p class="hero-p">ENGINEERING THE FUTURE</p>
        
        <div class="notice-box">
            ⚠️ 저희 동아리는 <strong>디스코드 계정 소지</strong>가 필수입니다.
        </div>

        <div style="margin-top: 30px;">
            <a href="apply.html" class="btn-join">JOIN US</a>
        </div>
    </section>

    <section id="poster-sec" style="min-height: 120vh;">
        <div class="a2-poster" id="a2-poster">
            <img src="poster.jpg" alt="NEUROSTACK VISION POSTER" onerror="this.parentElement.innerHTML='<div style=\'display:flex;align-items:center;justify-content:center;height:100%;color:var(--o)\'>A2 VISION POSTER</div>'">
        </div>
    </section>

    <script type="module" src="script.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);
        
        // 스크롤 시 포스터가 아래에서 위로 스르륵 등장하는 효과
        gsap.to("#a2-poster", {
            scrollTrigger: {
                trigger: "#poster-sec",
                start: "top 70%", // 섹션이 화면의 70% 지점에 도달하면 시작
                toggleActions: "play none none reverse"
            },
            opacity: 1,
            y: 0,
            duration: 1.5,
            ease: "power4.out"
        });
    </script>
</body>
</html>
