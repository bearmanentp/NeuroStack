<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NEUROSTACK | Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">NEUROSTACK</a>
        <div class="nav-links">
            <a href="apply.html">SUPPORT</a>
            <a href="check.html">STATUS</a>
        </div>
    </nav>
    <canvas id="bg-canvas"></canvas>

    <section>
        <h1 style="font-size: 6vw; color: var(--orange);">NEUROSTACK VISION</h1>
        <div style="margin-top: 30px;">
            <a href="apply.html" class="btn-legend">JOIN THE TEAM</a>
        </div>
    </section>

    <section id="image-section">
        <div id="a2-poster" style="width: auto; height: 80vh; aspect-ratio: 1/1.414; border: 2px solid var(--orange); opacity: 0;">
            <img src="poster.jpg" alt="A2 Poster" style="width:100%; height:100%; object-fit:cover;">
        </div>
    </section>

    <script type="module" src="script.js"></script>
    <script>
        // 메인 전용 스크롤 애니메이션
        setTimeout(() => {
            gsap.to("#a2-poster", {
                scrollTrigger: { trigger: "#image-section", start: "top 70%" },
                opacity: 1, y: -50, duration: 1.5
            });
        }, 500);
    </script>
</body>
</html>
